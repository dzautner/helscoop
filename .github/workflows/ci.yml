name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dingcad
          POSTGRES_PASSWORD: dingcad_dev
          POSTGRES_DB: dingcad
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://dingcad:dingcad_dev@localhost:5432/dingcad
      JWT_SECRET: test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Run migrations
        working-directory: api
        run: npm run db:migrate

      - name: Run unit tests
        working-directory: api
        run: npx vitest run

      - name: Run E2E tests
        working-directory: api
        env:
          E2E: "1"
          PORT: "3001"
        run: |
          npx tsx src/index.ts &
          sleep 3
          npx vitest run src/__tests__/e2e.test.ts
          kill %1 || true

  test-web:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

      - name: Build
        working-directory: web
        run: npm run build

  auto-merge:
    name: Auto Merge
    needs: [test-api, test-web]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge if CI passes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.user.login === 'dzautner' || pr.labels?.some(l => l.name === 'auto-merge')) {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log(`Auto-merged PR #${pr.number}`);
            }
