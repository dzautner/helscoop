# Fly.io configuration for Helscoop Web
# Deploy: fly deploy --config deploy/fly.web.toml
app = "helscoop-web"
primary_region = "ams"

[build]
  dockerfile = "../web/Dockerfile"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://helscoop-api.fly.dev"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
